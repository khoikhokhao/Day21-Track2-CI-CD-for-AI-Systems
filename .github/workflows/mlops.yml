name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          MLFLOW_ARTIFACT_ROOT: "./mlartifacts"
        run: |
          mkdir -p outputs models
          pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
      MLFLOW_ARTIFACT_ROOT: "./mlartifacts"
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install boto3 dvc[s3]
      
      - name: Authenticate to AWS and Pull data
        env:
          CRED_JSON: ${{ secrets.CLOUD_CREDENTIALS }}
        run: |
          # 1. Trích xuất key bằng python và đặt vào môi trường shell
          export AWS_ACCESS_KEY_ID=$(echo '$CRED_JSON' | python3 -c "import sys, json; print(json.load(sys.stdin)['aws_access_key_id'])")
          export AWS_SECRET_ACCESS_KEY=$(echo '$CRED_JSON' | python3 -c "import sys, json; print(json.load(sys.stdin)['aws_secret_access_key'])")
          export AWS_DEFAULT_REGION=ap-southeast-1
          
          # 2. Cấu hình trực tiếp cho DVC (Nuclear option để sửa lỗi credentials)
          dvc remote modify myremote --local access_key_id "$AWS_ACCESS_KEY_ID"
          dvc remote modify myremote --local secret_access_key "$AWS_SECRET_ACCESS_KEY"
          
          # 3. Kéo dữ liệu
          dvc pull data/train_phase1.csv data/eval.csv
          
          # 4. Lưu lại các biến này cho các bước sau của Job
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV

      - name: Train model
        run: |
          mkdir -p outputs models
          python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python3 -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python3 - <<'EOF'
          import boto3, os
          s3 = boto3.client('s3')
          s3.upload_file('models/model.pkl', '${{ secrets.CLOUD_BUCKET }}', 'models/latest/model.pkl')
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python3 - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              print(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
              exit(1)
          print(f"PASSED: accuracy {acc:.4f} >= 0.70. Dang trien khai...")
          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1